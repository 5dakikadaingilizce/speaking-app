<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce - V.3.7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.6); 
            --primary: #38bdf8; 
            --secondary: #2dd4bf; 
            --accent: #fb7185; 
            --text-main: #f8fafc; 
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316); 
            --white-grad: linear-gradient(180deg, #ffffff, #94a3b8);
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow-glow: 0 0 30px rgba(249, 115, 22, 0.15);
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100dvh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text-main); 
            overflow: hidden; 
            padding: 8px; 
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 95vh; overflow-y: auto; padding-bottom: 20px; }

        .main-title-white { 
            font-family: 'Poppins'; 
            font-size: 24px; 
            font-weight: 900; 
            background: var(--white-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px; 
            text-shadow: 0 2px 20px rgba(255,255,255,0.1);
        }

        .select-lesson-title {
            background: var(--logo-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 26px; 
            margin: 5px 0 20px 0; 
            font-weight: 900; 
            font-family: 'Poppins';
            filter: drop-shadow(0 0 15px rgba(249, 115, 22, 0.3));
        }

        #lesson-list-container { 
            width: 100%; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            max-width: 500px; 
            padding: 10px; 
        }

        .lesson-card { 
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 10px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border); 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
            position: relative;
            overflow: hidden;
        }

        .lesson-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #ff4d4d, #f97316);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lesson-card:hover { 
            border-color: rgba(249, 115, 22, 0.5); 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px -10px rgba(249, 115, 22, 0.25), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .lesson-card:hover::before { opacity: 1; }
        
        .lesson-card h3 { 
            margin: 0 0 8px 0; 
            font-family: 'Poppins'; 
            font-size: 1.1rem; 
            font-weight: 800; 
            background: var(--logo-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 2;
        }

        .lesson-desc { 
            font-size: 11px; 
            color: #94a3b8; 
            font-weight: 500; 
            position: relative;
            z-index: 2;
        }

        .v-tag { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            font-size: 10px; 
            color: rgba(255,255,255,0.4); 
            background: rgba(255,255,255,0.05); 
            padding: 4px 10px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .material-symbols-rounded { 
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; 
            vertical-align: middle; 
            transition: transform 0.2s;
        }

        #app-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; }

        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            gap: 5px; 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            padding: 6px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .nav-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 12px; 
            height: 40px; 
            padding: 0 12px; 
            font-size: 11px; 
            font-weight: 700; 
            color: #94a3b8; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            touch-action: manipulation;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            transform: translateY(-1px);
        }

        .nav-btn:hover .material-symbols-rounded { transform: scale(1.1); }

        .auto-tr-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #94a3b8; }
        .auto-tr-btn.active { 
            background: linear-gradient(135deg, #fb7185 0%, #f43f5e 100%); 
            color: white; 
            border-color: rgba(255,255,255,0.3); 
            box-shadow: 0 4px 15px rgba(251, 113, 133, 0.4); 
        }

        .app-box { 
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.8) 100%);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 20px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), var(--shadow-glow); 
            text-align: center; 
            position: relative;
            overflow: hidden;
        }

        .app-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* Header ortada */
        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .app-logo {
            width: 50px;
            margin-bottom: 5px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        .sub-title-white {
            font-size: 11px; 
            font-weight: 700; 
            color: rgba(255,255,255,0.8); 
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .lesson-title-grad { 
            background: var(--logo-grad); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 900; 
            font-size: 22px; 
            font-family: 'Poppins';
            filter: drop-shadow(0 0 20px rgba(249, 115, 22, 0.2));
            margin-bottom: 4px;
        }

        #lessonSubTitle {
            color: #94a3b8; 
            font-size: 11px; 
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 10px;
        }
        
        /* Phrase Container - BÜYÜTÜLMÜŞ */
        .phrase-container { 
            min-height: 140px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            margin: 10px 0 15px 0;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 20px;
            padding: 25px 20px;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }

        .phrase-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--secondary), transparent);
            opacity: 0.5;
        }

        #phrase-tr { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--secondary); 
            margin-bottom: 8px; 
            text-shadow: 0 0 20px rgba(45, 212, 191, 0.2);
            line-height: 1.3;
        }

        #phrase-en { 
            font-size: 18px; 
            color: #94a3b8; 
            font-style: italic; 
            transition: 0.3s;
            line-height: 1.4;
        }
        
        /* TAP TO SPEAK - ESNEK, icon yok */
        .start { 
            background: linear-gradient(135deg, #38bdf8, #0ea5e9); 
            color: #0f172a; 
            width: 100%; 
            padding: 15px; 
            border-radius: 18px; 
            font-size: 16px; 
            font-weight: 900; 
            border: none; 
            font-family: 'Poppins'; 
            cursor: pointer; 
            position: relative;
            overflow: hidden;
            animation: pulse-glow 2s infinite;
            touch-action: manipulation;
            margin-bottom: 10px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); transform: scale(1); }
        }

        .recording { 
            background: #fb7185 !important; 
            animation: recording-glow 1s infinite !important; 
            color: white !important;
        }

        @keyframes recording-glow {
            0% { box-shadow: 0 0 5px #fb7185; }
            50% { box-shadow: 0 0 20px #fb7185; }
            100% { box-shadow: 0 0 5px #fb7185; }
        }

        /* 3 buton row */
        .btn-row-3 {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-show {
            flex: 1;
            background: rgba(56,189,248,0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 12px;
            padding: 12px 5px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-show:hover { background: rgba(56,189,248,0.3); }

        .btn-pass {
            flex: 1;
            background: linear-gradient(135deg, #fb7185 0%, #f43f5e 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 5px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(251, 113, 133, 0.3);
        }

        .btn-pass:hover { transform: translateY(-2px); }

        /* LISTEN EN - sadece burada icon */
        .btn-listen {
            flex: 1;
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 5px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.3s;
        }

        .btn-listen:hover { transform: translateY(-2px); }
        .btn-listen .material-symbols-rounded { font-size: 16px; }

        /* BACK/NEXT - flash card'daki gibi, icon yok */
        .controls-row { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 10px; 
        }
        
        .control-btn { 
            flex: 1; 
            background: rgba(51, 65, 85, 0.7); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 12px; 
            border-radius: 12px; 
            color: white; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(71, 85, 105, 0.8);
            transform: translateY(-2px);
        }

        .ctrl { 
            background: rgba(51, 65, 85, 0.6); 
            color: white; 
            flex: 1; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
            font-weight: 700; 
            font-size: 11px; 
            cursor: pointer; 
            touch-action: manipulation;
            transition: all 0.3s;
        }

        .ctrl:hover { background: rgba(71, 85, 105, 0.8); }
        
        /* Stats - icon yok */
        .stats { 
            margin-top: 10px; 
            font-size: 7px; 
            color: #94a3b8; 
            background: rgba(15, 23, 42, 0.4); 
            padding: 10px 5px; 
            border-radius: 18px; 
            display: flex; 
            justify-content: space-between; 
            gap: 2px; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1;
        }

        .stat-label-row { 
            display: flex; 
            align-items: center; 
            gap: 3px; 
            margin-bottom: 2px; 
            font-size: 7px;
        }

        .stat-val { 
            font-weight: 800; 
            font-size: 12px; 
        }

        .lesson-card.disabled { 
            opacity: 0.4; 
            filter: grayscale(1); 
            pointer-events: none; 
        }

        #restartOverlay {
            display: none; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); 
            border-radius: 30px; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 50;
        }

        #restartOverlay h2 {
            color: white; 
            font-family: 'Poppins';
            font-size: 32px;
            margin-bottom: 10px;
        }

        #result {
            height: 35px; 
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="v-tag">V.3.7</div>

<div id="entry-page">
    <img src="logo.png" style="width: 80px; margin-bottom: 10px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div class="select-lesson-title">Module #1</div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div class="top-bar">
        <button class="nav-btn" onclick="goHome()">
            <span class="material-symbols-rounded">home</span> HOME
        </button>
        <button id="autoTRToggle" class="nav-btn auto-tr-btn" onclick="toggleAutoTR()">
            <span class="material-symbols-rounded">volume_up</span> AUTO TR
        </button>
        <button class="nav-btn" onclick="resetToStart()">
            <span class="material-symbols-rounded">refresh</span> RESTART
        </button>
    </div>
    
    <div class="app-box">
        <div id="restartOverlay">
            <h2>Completed! 🏆</h2>
            <button class="start" onclick="resetToStart()" style="width:80%">RESTART</button>
        </div>
        
        <!-- Header ortada -->
        <div class="header-center">
            <img src="logo.png" class="app-logo" onerror="this.style.display='none'">
            <div class="sub-title-white">5 Dakikada İngilizce</div>
            <div id="lessonTitle" class="lesson-title-grad">#Lesson 1</div>
            <div id="lessonSubTitle">Yükleniyor...</div>
        </div>
        
        <!-- Phrase Container - BÜYÜTÜLMÜŞ -->
        <div class="phrase-container">
            <div id="phrase-tr">...</div>
            <div id="phrase-en" style="opacity:0;">...</div>
        </div>

        <!-- TAP TO SPEAK - ESNEK, icon yok -->
        <button class="start" id="startBtn">TAP TO SPEAK</button>

        <!-- 3 buton: SHOW | PASS | LISTEN -->
        <div class="btn-row-3">
            <button class="btn-show" id="toggleBtn">SHOW ENGLISH</button>
            <button class="btn-pass" id="passBtn">PASS</button>
            <button class="btn-listen" id="listenBtn">
                <span class="material-symbols-rounded">record_voice_over</span> LISTEN
            </button>
        </div>

        <!-- BACK/NEXT - flash card'daki gibi, icon yok -->
        <div class="controls-row">
            <button class="control-btn" id="backBtn">← BACK</button>
            <button class="control-btn" id="nextBtn">NEXT →</button>
        </div>

        <div id="result"></div>
        
        <!-- Stats - icon yok -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label-row">ORDER</div>
                <span id="current" class="stat-val" style="color:var(--primary)">1</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">CORRECT</div>
                <span id="correct" class="stat-val" style="color:var(--secondary)">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">PASS</div>
                <span id="passedCount" class="stat-val" style="color:var(--accent)">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label-row">REMAIN</div>
                <span id="remaining" class="stat-val" style="color:#f97316">0</span>
            </div>
        </div>
    </div>
</div>

<script>
let allLessonsData = [];
let index = 0, correctCount = 0, passedCount = 0, isListening = false, showEn = false, autoMode = false;
let currentList = [];
let activeLessonId = null;
let isAutoTR = localStorage.getItem('auto_tr_voice') === 'true';

if(isAutoTR) document.getElementById('autoTRToggle').classList.add('active');

fetch('data.json').then(res => res.json()).then(data => {
    allLessonsData = data;
    renderLessonMenu();
});

function toggleAutoTR() {
    isAutoTR = !isAutoTR;
    localStorage.setItem('auto_tr_voice', isAutoTR);
    document.getElementById('autoTRToggle').classList.toggle('active');
}

function speakTR() {
    if(!currentList.length || !isAutoTR) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(currentList[index].tr);
    u.lang = "tr-TR"; u.rate = 1.0;
    window.speechSynthesis.speak(u);
}

function speakEN() {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(currentList[index].en);
    u.lang = "en-US"; u.rate = 0.8;
    window.speechSynthesis.speak(u);
}

function renderLessonMenu() {
    const container = document.getElementById('lesson-list-container');
    container.innerHTML = "";
    allLessonsData.forEach(lesson => {
        const card = document.createElement('div');
        const isAvailable = !!lesson.file;
        card.className = 'lesson-card' + (!isAvailable ? ' disabled' : '');
        card.onclick = () => { if(isAvailable) startLesson(lesson); };
        card.innerHTML = `<h3>${lesson.title}</h3><div class="lesson-desc">${!isAvailable ? 'Coming Soon' : lesson.subTitle}</div>`;
        container.appendChild(card);
    });
}

function startLesson(lesson) {
    fetch(lesson.file).then(res => res.json()).then(contentData => {
        activeLessonId = lesson.id;
        currentList = [...contentData]; 
        const saved = localStorage.getItem('lesson_progress_' + activeLessonId);
        if(saved) {
            const progress = JSON.parse(saved);
            index = progress.index;
            correctCount = progress.correctCount;
            passedCount = progress.passedCount;
        } else {
            index = 0; correctCount = 0; passedCount = 0;
        }
        document.getElementById("lessonTitle").innerText = lesson.title;
        document.getElementById("lessonSubTitle").innerText = lesson.subTitle;
        document.getElementById("entry-page").style.display = "none";
        document.getElementById("app-screen").style.display = "flex";
        render(true);
    });
}

function saveProgress() {
    if(activeLessonId) {
        const progress = { index, correctCount, passedCount };
        localStorage.setItem('lesson_progress_' + activeLessonId, JSON.stringify(progress));
    }
}

function render(shouldSpeakTR = false) {
    if(index >= currentList.length) { document.getElementById("restartOverlay").style.display = "flex"; return; }
    document.getElementById("phrase-tr").textContent = currentList[index].tr;
    document.getElementById("phrase-en").textContent = currentList[index].en;
    document.getElementById("phrase-en").style.opacity = showEn ? "1" : "0";
    document.getElementById("toggleBtn").innerText = showEn ? "HIDE ENGLISH" : "SHOW ENGLISH";
    document.getElementById("current").textContent = index + 1;
    document.getElementById("correct").textContent = correctCount;
    document.getElementById("passedCount").textContent = passedCount;
    document.getElementById("remaining").textContent = currentList.length - (index + 1);
    saveProgress();
    
    if(isAutoTR && shouldSpeakTR) setTimeout(speakTR, 400);
}

function playBeep(isCorrect) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = isCorrect ? 800 : 150;
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
}

function normalizeForComparison(text) {
    const numMap = { "0":"zero", "1":"one", "2":"two", "3":"three", "4":"four", "5":"five", "6":"six", "7":"seven", "8":"eight", "9":"nine", "10":"ten" };
    let t = text.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
    
    Object.keys(numMap).forEach(num => {
        t = t.replace(new RegExp(`\\b${num}\\b`, 'g'), numMap[num]);
    });

    t = t.replace(/\boff\b/g, "of"); 
    
    return t;
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SR();
rec.lang = "en-US";
rec.continuous = true;

rec.onstart = () => { isListening = true; document.getElementById("startBtn").innerText = "LISTENING..."; document.getElementById("startBtn").classList.add("recording"); };

rec.onresult = e => {
    let spoken = e.results[e.results.length - 1][0].transcript;
    let target = currentList[index].en;
    
    let procSpoken = normalizeForComparison(spoken);
    let procTarget = normalizeForComparison(target);

    if(procSpoken === procTarget || procSpoken.includes(procTarget)) {
        correctCount++;
        playBeep(true);
        document.getElementById("result").innerHTML = "<span style='color:var(--secondary)'>EXCELLENT! ✅</span>";
        setTimeout(() => { nextWord(); if(!autoMode) rec.stop(); }, 800);
    } else {
        playBeep(false);
        document.getElementById("result").innerHTML = `<span style='color:var(--accent)'>HEARD: "${spoken}" ❌</span>`;
    }
};

rec.onend = () => { if(autoMode) rec.start(); else { isListening = false; document.getElementById("startBtn").innerText = "TAP TO SPEAK"; document.getElementById("startBtn").classList.remove("recording"); } };

function goHome() { autoMode = false; try { rec.stop(); } catch(e) {} document.getElementById("app-screen").style.display = "none"; document.getElementById("entry-page").style.display = "flex"; }

function resetToStart() {
    if(confirm("Sıfırlansın mı?")) {
        index = 0; correctCount = 0; passedCount = 0;
        localStorage.removeItem('lesson_progress_' + activeLessonId);
        document.getElementById("restartOverlay").style.display = "none";
        render(true);
        document.getElementById("result").innerHTML = "";
    }
}

function nextWord() { 
    if(index < currentList.length - 1) { 
        index++; 
        showEn = false; 
        render(true); 
        document.getElementById("result").innerHTML = ""; 
    } else { 
        document.getElementById("restartOverlay").style.display = "flex"; 
    } 
}

document.getElementById("startBtn").onclick = () => { if(!isListening) { autoMode = true; rec.start(); } else { autoMode = false; rec.stop(); } };
document.getElementById("listenBtn").onclick = speakEN;
document.getElementById("toggleBtn").onclick = () => { showEn = !showEn; render(false); };
document.getElementById("nextBtn").onclick = nextWord;
document.getElementById("backBtn").onclick = () => { if(index > 0) { index--; render(true); } };
document.getElementById("passBtn").onclick = () => { passedCount++; currentList.push(currentList[index]); nextWord(); };
</script>
</body>
</html>
