<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce - V.3.6</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --primary: #38bdf8; --secondary: #2dd4bf; --accent: #fb7185; --text-main: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100dvh; display: flex; justify-content: center; align-items: center; color: var(--text-main); padding: 15px; box-sizing: border-box; overflow: hidden; }
        
        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .main-title { font-family: 'Poppins'; font-size: 26px; font-weight: 900; background: linear-gradient(90deg, #ff4d4d, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        
        #lesson-list-container { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 500px; }
        .lesson-card { background: var(--card-bg); padding: 20px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; cursor: pointer; transition: 0.2s; }
        .lesson-card:active { transform: scale(0.95); background: #1e293b; }
        .lesson-card h3 { margin: 0; font-size: 1rem; color: #f97316; font-family: 'Poppins'; }

        #app-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 15px; }
        .app-box { background: var(--card-bg); padding: 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; position: relative; }
        
        #phrase-tr { font-size: 28px; font-weight: 800; color: var(--secondary); margin-bottom: 10px; min-height: 40px; }
        #phrase-en { font-size: 18px; color: #94a3b8; margin-bottom: 20px; height: 24px; font-style: italic; }
        
        .start { background: #38bdf8; color: #0f172a; width: 100%; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: 900; border: none; cursor: pointer; transition: 0.3s; }
        .recording { background: #fb7185 !important; color: white; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .ctrl { background: #334155; color: white; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 12px; }
        
        #result { margin-top: 15px; min-height: 40px; font-weight: bold; font-size: 14px; line-height: 1.4; }
        .stats { display: flex; justify-content: space-between; margin-top: 20px; font-size: 12px; opacity: 0.8; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
    </style>
</head>
<body>

<div id="entry-page">
    <div class="main-title">5 Dakikada İngilizce</div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <button class="ctrl" onclick="location.reload()" style="width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.05);">← ANA MENÜ</button>
    <div class="app-box">
        <div id="phrase-tr">Yükleniyor...</div>
        <div id="phrase-en" style="visibility: hidden;">...</div>
        
        <button class="start" id="startBtn">TAP TO SPEAK</button>
        
        <div class="ctrl-grid">
            <button class="ctrl" id="listenBtn" style="background: #0ea5e9;">LISTEN</button>
            <button class="ctrl" id="toggleBtn">SHOW</button>
            <button class="ctrl" id="backBtn">BACK</button>
            <button class="ctrl" id="nextBtn">NEXT</button>
        </div>
        
        <div id="result"></div>
        
        <div class="stats">
            <span>Sıra: <b id="current">0</b> / <span id="total">0</span></span>
            <span>Doğru: <b id="correct">0</b></span>
        </div>
    </div>
</div>

<script>
let index = 0, correctCount = 0, currentList = [], isListening = false;
const startBtn = document.getElementById("startBtn");
const resultDiv = document.getElementById("result");

// 1. DERSLERİ YÜKLE
fetch('data.json').then(r => r.json()).then(data => {
    const container = document.getElementById('lesson-list-container');
    data.forEach(l => {
        if(!l.file) return;
        const card = document.createElement('div');
        card.className = 'lesson-card';
        card.innerHTML = `<h3>${l.title}</h3>`;
        card.onclick = () => startLesson(l.file);
        container.appendChild(card);
    });
});

function startLesson(file) {
    fetch(file).then(r => r.json()).then(data => {
        currentList = data;
        document.getElementById("entry-page").style.display = "none";
        document.getElementById("app-screen").style.display = "flex";
        document.getElementById("total").textContent = currentList.length;
        render();
    });
}

function render() {
    if(index >= currentList.length) { 
        resultDiv.innerHTML = "<span style='color:var(--secondary)'>DERS BİTTİ! 🏆</span>";
        setTimeout(() => location.reload(), 2000);
        return; 
    }
    document.getElementById("phrase-tr").textContent = currentList[index].tr;
    document.getElementById("phrase-en").textContent = currentList[index].en;
    document.getElementById("phrase-en").style.visibility = "hidden";
    document.getElementById("current").textContent = index + 1;
    document.getElementById("correct").textContent = correctCount;
    resultDiv.textContent = "";
    resultDiv.style.color = "white";
}

// 2. SES ÇALMA (Tıklandığında indirir ve çalar)
document.getElementById("listenBtn").onclick = () => {
    const text = currentList[index].en;
    const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&type=2`);
    audio.play().catch(() => console.log("Ses hatası."));
};

// 3. SES TANIMA AYARLARI
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
    alert("Tarayıcınız ses tanımayı desteklemiyor. Lütfen Chrome kullanın.");
}
const rec = new SR();
rec.lang = "en-US";
rec.interimResults = false; // Anlık işlem yapmaz, donmayı önler.

startBtn.onclick = () => {
    if(!isListening) {
        try { rec.start(); } catch(e) { rec.stop(); }
    } else {
        rec.stop();
    }
};

rec.onstart = () => {
    isListening = true;
    startBtn.innerText = "LISTENING...";
    startBtn.classList.add("recording");
    resultDiv.textContent = "Dinleniyor...";
};

rec.onresult = (e) => {
    let spoken = e.results[0][0].transcript.toLowerCase().trim();
    
    // Temizleme: Noktalama işaretlerini at, sadece kelimelere bak
    const clean = (str) => str.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").replace(/\s+/g, " ").trim();
    
    let processedSpoken = clean(spoken);
    let processedTarget = clean(currentList[index].en.toLowerCase());

    resultDiv.innerHTML = `Duyulan: <br>"${spoken}"`;

    // KESİN EŞLEŞME KONTROLÜ
    if(processedSpoken === processedTarget) {
        correctCount++;
        resultDiv.style.color = "#2dd4bf";
        resultDiv.innerHTML = "DOĞRU! ✅";
        rec.stop(); // Başarılı olunca durdur
        setTimeout(() => { index++; render(); }, 1200);
    } else {
        resultDiv.style.color = "#fb7185";
        // Yanlışsa durmaz, tekrar denenebilir veya manuel durdurulur.
    }
};

rec.onend = () => {
    isListening = false;
    startBtn.innerText = "TAP TO SPEAK";
    startBtn.classList.remove("recording");
};

rec.onerror = () => {
    rec.stop();
};

// 4. KONTROLLER
document.getElementById("toggleBtn").onclick = () => {
    const en = document.getElementById("phrase-en");
    en.style.visibility = en.style.visibility === "hidden" ? "visible" : "hidden";
};
document.getElementById("nextBtn").onclick = () => { index++; render(); };
document.getElementById("backBtn").onclick = () => { if(index > 0) { index--; render(); } };
</script>

</body>
</html>
