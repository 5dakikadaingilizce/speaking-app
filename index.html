<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce - V.2.8</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7); 
            --primary: #38bdf8; 
            --secondary: #2dd4bf; 
            --accent: #fb7185; 
            --text-main: #f1f5f9; 
            --logo-grad: linear-gradient(135deg, #38bdf8, #818cf8); 
        }

        /* GENEL TASARIM DOKUNUŞLARI */
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100dvh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text-main); 
            overflow: hidden; 
            padding: 10px; 
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ANA SAYFA TASARIMI */
        #entry-page { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            max-height: 95vh; 
            overflow-y: auto; 
            scrollbar-width: none; /* Firefox */
        }
        #entry-page::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .main-title-white { 
            font-family: 'Poppins', sans-serif;
            font-size: 24px; 
            font-weight: 800; 
            color: white; 
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }

        #lesson-list-container { 
            width: 100%; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 450px; 
            padding: 20px 10px; 
        }

        .lesson-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px 15px; 
            border-radius: 28px; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lesson-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-5px);
            background: rgba(51, 65, 85, 0.9);
            box-shadow: 0 12px 40px rgba(56, 189, 248, 0.2);
        }

        .lesson-card h3 { 
            margin: 0; 
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem; 
            color: var(--primary); 
            font-weight: 700; 
        }

        .lesson-desc { font-size: 12px; color: #94a3b8; font-weight: 500; }

        /* UYGULAMA EKRANI (İÇ SAYFA) */
        #app-screen { display: none; width: 100%; max-width: 420px; flex-direction: column; }
        
        .nav-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 14px; 
            height: 44px; 
            font-weight: 700; 
            color: white; 
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .app-box { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            padding: 30px 20px; 
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
        }

        .lesson-title-grad { 
            font-family: 'Poppins', sans-serif;
            background: var(--logo-grad); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 800; 
            font-size: 24px; 
        }

        #phrase-tr { font-size: 28px; font-weight: 800; color: var(--secondary); letter-spacing: -0.5px; }
        #phrase-en { font-size: 18px; color: #cbd5e1; font-weight: 500; }

        .start { 
            background: linear-gradient(135deg, #38bdf8, #818cf8); 
            color: #0f172a; 
            border-radius: 20px; 
            padding: 18px;
            font-size: 18px; 
            font-weight: 800; 
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
            font-family: 'Poppins', sans-serif;
        }

        .ctrl { 
            background: #334155; 
            border-radius: 15px; 
            font-size: 12px; 
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stats { 
            margin-top: 15px; 
            background: rgba(15, 23, 42, 0.6); 
            padding: 15px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* DİĞER STANDARTLAR */
        .v-tag { position: absolute; top: 15px; right: 15px; font-size: 10px; opacity: 0.5; font-weight: 700; }
        .lesson-card.disabled { opacity: 0.3; filter: grayscale(1); }
        .recording { background: #fb7185 !important; box-shadow: 0 0 20px rgba(251, 113, 133, 0.4) !important; color: white !important; }
        .ctrl-container { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="v-tag">V.2.8</div>

<div id="entry-page">
    <img src="logo.png" style="width: 70px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.4));">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <h1 style="color: #94a3b8; font-size: 16px; margin: 0 0 10px 0; font-weight: 500; letter-spacing: 1px;">LEVEL SELECT</h1>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div class="top-bar" style="display:flex; justify-content: space-between; margin-bottom: 12px;">
        <button class="nav-btn" onclick="goHome()" style="width: 100px; display: flex; align-items: center; justify-content: center; gap: 5px;">
            <span class="material-symbols-rounded" style="font-size: 18px;">home</span> HOME
        </button>
        <button class="nav-btn" onclick="resetToStart()" style="width: 110px; display: flex; align-items: center; justify-content: center; gap: 5px;">
            <span class="material-symbols-rounded" style="font-size: 18px;">refresh</span> RESTART
        </button>
    </div>
    <div class="app-box">
        <div id="restartOverlay" class="restart-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); border-radius: 40px; flex-direction: column; justify-content: center; align-items: center; z-index: 50;">
            <h2 style="color:white; font-family:'Poppins'; font-size: 28px;">Completed! 🏆</h2>
            <button class="start" onclick="resetToStart()" style="width: 200px; margin-top: 20px;">RESTART</button>
        </div>
        <img src="logo.png" style="width: 50px; display: block; margin: 0 auto 10px;">
        <div id="lessonTitle" class="lesson-title-grad">#Lesson 1</div>
        <div id="lessonSubTitle" class="lesson-sub-white" style="font-size: 12px; opacity: 0.7; margin-bottom: 20px;">Yükleniyor...</div>
        
        <div class="phrase-container" style="min-height: 120px; display: flex; flex-direction: column; justify-content: center;">
            <div id="phrase-tr">...</div>
            <div id="phrase-en" style="margin-top: 10px; opacity: 0; transition: 0.3s;">...</div>
        </div>

        <button class="start" id="startBtn" style="width: 100%; cursor: pointer;">TAP TO SPEAK</button>

        <div class="ctrl-container">
            <button class="ctrl" id="toggleBtn" style="width: 100%; padding: 12px; background: rgba(56, 189, 248, 0.15); color: var(--primary); border: 1px solid var(--primary);">SHOW ENGLISH</button>
            <button class="ctrl" id="passBtn" style="color:var(--accent); flex: 1; padding: 12px;">PASS</button>
            <button class="ctrl" id="listenBtn" style="flex: 1; padding: 12px;">LISTEN</button>
            <div style="display:flex; width:100%; gap:8px;">
                <button class="ctrl" id="backBtn" style="flex: 1; padding: 12px;">← BACK</button>
                <button class="ctrl" id="nextBtn" style="flex: 1; padding: 12px;">NEXT →</button>
            </div>
        </div>
        
        <div id="result" style="height: 30px; font-weight: 800; text-align: center; margin-bottom: 10px;"></div>

        <div class="stats" style="display: flex; justify-content: space-between;">
            <div class="stat-item" style="text-align: center;">
                <div style="font-size: 9px; opacity: 0.6; margin-bottom: 5px;">ORDER</div>
                <span id="current" class="stat-val" style="font-size: 16px; color: var(--primary); font-weight: 800;">1</span>
            </div>
            <div class="stat-item" style="text-align: center;">
                <div style="font-size: 9px; opacity: 0.6; margin-bottom: 5px;">CORRECT</div>
                <span id="correct" class="stat-val" style="font-size: 16px; color: var(--secondary); font-weight: 800;">0</span>
            </div>
            <div class="stat-item" style="text-align: center;">
                <div style="font-size: 9px; opacity: 0.6; margin-bottom: 5px;">PASS</div>
                <span id="passedCount" class="stat-val" style="font-size: 16px; color: var(--accent); font-weight: 800;">0</span>
            </div>
            <div class="stat-item" style="text-align: center;">
                <div style="font-size: 9px; opacity: 0.6; margin-bottom: 5px;">REMAIN</div>
                <span id="remaining" class="stat-val" style="font-size: 16px; color: #f97316; font-weight: 800;">0</span>
            </div>
        </div>
    </div>
</div>

<script>
/* SCRIPT KISMINA HİÇ DOKUNULMADI - TÜM FONKSİYONLARIN AYNI ÇALIŞACAK */
let allLessonsData = [];
let index = 0, correctCount = 0, passedCount = 0, isListening = false, showEn = false, autoMode = false;
let currentList = [];
let activeLessonId = null;

fetch('data.json').then(res => res.json()).then(data => {
    allLessonsData = data;
    renderLessonMenu();
});

function renderLessonMenu() {
    const container = document.getElementById('lesson-list-container');
    container.innerHTML = "";
    allLessonsData.forEach(lesson => {
        const card = document.createElement('div');
        const isAvailable = lesson.file ? true : false;
        card.className = 'lesson-card' + (!isAvailable ? ' disabled' : '');
        card.onclick = () => { if(isAvailable) startLesson(lesson); };
        card.innerHTML = `<h3>${lesson.title}</h3><div class="lesson-desc">${!isAvailable ? 'Coming Soon' : lesson.subTitle}</div>`;
        container.appendChild(card);
    });
}

function startLesson(lesson) {
    fetch(lesson.file).then(res => res.json()).then(contentData => {
        activeLessonId = lesson.id;
        currentList = [...contentData]; 
        const saved = localStorage.getItem('lesson_progress_' + activeLessonId);
        if(saved) {
            const progress = JSON.parse(saved);
            index = progress.index;
            correctCount = progress.correctCount;
            passedCount = progress.passedCount;
        } else {
            index = 0; correctCount = 0; passedCount = 0;
        }
        document.getElementById("lessonTitle").innerText = lesson.title;
        document.getElementById("lessonSubTitle").innerText = lesson.subTitle;
        document.getElementById("entry-page").style.display = "none";
        document.getElementById("app-screen").style.display = "flex";
        render();
    });
}

function saveProgress() {
    if(activeLessonId) {
        const progress = { index, correctCount, passedCount };
        localStorage.setItem('lesson_progress_' + activeLessonId, JSON.stringify(progress));
    }
}

function render() {
    if(index >= currentList.length) { document.getElementById("restartOverlay").style.display = "flex"; return; }
    document.getElementById("phrase-tr").textContent = currentList[index].tr;
    document.getElementById("phrase-en").textContent = currentList[index].en;
    document.getElementById("phrase-en").style.opacity = showEn ? "1" : "0";
    document.getElementById("toggleBtn").innerText = showEn ? "HIDE ENGLISH" : "SHOW ENGLISH";
    document.getElementById("current").textContent = index + 1;
    document.getElementById("correct").textContent = correctCount;
    document.getElementById("passedCount").textContent = passedCount;
    document.getElementById("remaining").textContent = currentList.length - (index + 1);
    saveProgress();
}

function playBeep(isCorrect) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = isCorrect ? 800 : 150;
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
}

function speak() {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(currentList[index].en);
    u.lang = "en-US"; u.rate = 0.8;
    window.speechSynthesis.speak(u);
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SR();
rec.lang = "en-US";
rec.continuous = true;

rec.onstart = () => { isListening = true; document.getElementById("startBtn").innerText = "LISTENING..."; document.getElementById("startBtn").classList.add("recording"); };

rec.onresult = e => {
    let spoken = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
    let target = currentList[index].en.toLowerCase().trim();
    const numMap = { "one": "1", "two": "2", "three": "3", "tree": "3", "free": "3", "four": "4", "for": "4", "five": "5", "six": "6", "seven": "7", "eight": "8", "nine": "9", "ten": "10" };
    let processedSpoken = spoken.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
    let processedTarget = target.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
    Object.keys(numMap).forEach(key => { processedSpoken = processedSpoken.replace(new RegExp(`\\b${key}\\b`, 'g'), numMap[key]); });

    if(processedSpoken === processedTarget) {
        correctCount++;
        playBeep(true);
        document.getElementById("result").innerHTML = "<span style='color:var(--secondary)'>EXCELLENT! ✅</span>";
        setTimeout(() => { nextWord(); if(!autoMode) rec.stop(); }, 800);
    } else {
        playBeep(false);
        document.getElementById("result").innerHTML = `<span style='color:var(--accent)'>HEARD: "${spoken}" ❌</span>`;
    }
};

rec.onend = () => { if(autoMode) rec.start(); else { isListening = false; document.getElementById("startBtn").innerText = "TAP TO SPEAK"; document.getElementById("startBtn").classList.remove("recording"); } };

function goHome() { autoMode = false; try { rec.stop(); } catch(e) {} document.getElementById("app-screen").style.display = "none"; document.getElementById("entry-page").style.display = "flex"; }

function resetToStart() {
    if(confirm("Ders sıfırlanacak. Emin misiniz?")) {
        index = 0; correctCount = 0; passedCount = 0;
        localStorage.removeItem('lesson_progress_' + activeLessonId);
        document.getElementById("restartOverlay").style.display = "none";
        render();
        document.getElementById("result").innerHTML = "";
    }
}

function nextWord() { if(index < currentList.length - 1) { index++; showEn = false; render(); document.getElementById("result").innerHTML = ""; } else { document.getElementById("restartOverlay").style.display = "flex"; } }

document.getElementById("startBtn").onclick = () => { if(!isListening) { autoMode = true; rec.start(); } else { autoMode = false; rec.stop(); } };
document.getElementById("listenBtn").onclick = speak;
document.getElementById("toggleBtn").onclick = () => { showEn = !showEn; render(); };
document.getElementById("nextBtn").onclick = nextWord;
document.getElementById("backBtn").onclick = () => { if(index > 0) { index--; render(); } };
document.getElementById("passBtn").onclick = () => { passedCount++; currentList.push(currentList[index]); nextWord(); };
window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>
</body>
</html>
