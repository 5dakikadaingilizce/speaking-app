<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce - V.4.4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316);
            --white-grad: linear-gradient(180deg, #ffffff, #94a3b8);
            --secondary: #2dd4bf;
            --accent: #fb7185;
            --glass-border: rgba(255,255,255,0.12);
            --shadow-glow: 0 0 30px rgba(249,115,22,0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #f8fafc;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* ══ ENTRY PAGE ══ */
        #entry-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px 14px 60px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        #entry-page::-webkit-scrollbar { display: none; }

        .main-title-white {
            font-family: 'Poppins';
            font-size: clamp(20px,5vw,26px);
            font-weight: 900;
            background: var(--white-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .select-lesson-title {
            background: var(--logo-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(22px,6vw,28px);
            margin: 4px 0 20px;
            font-weight: 900;
            font-family: 'Poppins';
            filter: drop-shadow(0 0 15px rgba(249,115,22,0.3));
        }

        /* ══ DUOLINGO S-SHAPE LESSON LIST ══ */
        #lesson-list-container {
            width: 100%;
            max-width: 360px;
            padding: 0 4px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
        }

        .lesson-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            margin-bottom: 16px;
            z-index: 1;
            transition: transform 0.2s;
        }
        .lesson-card:active { transform: scale(0.95); }

        /* S-şekli: sol → sağ kıvrım */
        .lesson-card:nth-child(5n+1) { align-self: flex-start; margin-left: 10px; }
        .lesson-card:nth-child(5n+2) { align-self: flex-start; margin-left: 55px; }
        .lesson-card:nth-child(5n+3) { align-self: center; }
        .lesson-card:nth-child(5n+4) { align-self: flex-end; margin-right: 55px; }
        .lesson-card:nth-child(5n+5) { align-self: flex-end; margin-right: 10px; }

        .node-btn {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }
        .node-btn:hover { transform: translateY(-4px) scale(1.05); }

        .node-logo {
            width: 68%; height: 68%;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            display: block;
        }
        .node-num {
            font-size: 26px;
            display: flex; align-items: center; justify-content: center;
            width: 60%; height: 60%;
            font-weight: 900; font-family: 'Poppins';
            color: rgba(255,255,255,0.9);
        }

        .lesson-card h3 {
            font-size: 11px; font-weight: 800; color: #f8fafc;
            text-align: center; max-width: 100px; font-family: 'Poppins';
            line-height: 1.2; margin: 6px 0 2px 0 !important;
        }
        .lesson-sub {
            font-size: 9px; color: #64748b; text-align: center;
            max-width: 100px; line-height: 1.3; margin: 0 0 3px 0; font-weight: 500;
        }
        .lesson-stars {
            display: flex; gap: 3px; font-size: 13px; line-height: 1; justify-content: center;
        }

        @keyframes floatAnim { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .lesson-card.active .node-btn {
            width: 104px !important; height: 104px !important;
            background: #fbbf24 !important;
            box-shadow: 0 8px 0 #d97706, 0 16px 30px rgba(251,191,36,0.4) !important;
            animation: floatAnim 2.5s ease-in-out infinite;
        }
        .lesson-card.completed .node-btn { opacity: 0.85; }
        .lesson-card.disabled { cursor: not-allowed; }
        .lesson-card.disabled .node-btn { background: #374151 !important; box-shadow: 0 8px 0 #1f2937 !important; opacity: 0.55; }
        .lesson-card.disabled .node-logo { filter: grayscale(1) opacity(0.4); }
        .lesson-card.disabled h3 { color: #4b5563; }
        .lesson-card.disabled .lesson-stars { opacity: 0.3; }

        .start-badge {
            position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
            background: white; color: #d97706; padding: 4px 12px;
            border-radius: 12px; font-weight: 900; font-size: 10px;
            box-shadow: 0 4px 0 #cbd5e1; z-index: 15;
            animation: bounce 1.5s infinite; white-space: nowrap;
        }

        @keyframes float3d {
            0% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(6deg); }
            100% { transform: translateY(0px) rotateX(0deg); }
        }

        /* ══ VERSION TAG ══ */
        .v-tag {
            position: fixed; top: 10px; right: 10px;
            font-size: 10px; color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.05); padding: 4px 10px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.06);
            font-weight: 600; letter-spacing: 0.5px; z-index: 200; pointer-events: none;
        }
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle; transition: transform 0.2s;
        }

        /* ══ APP SCREEN ══ */
        #app-screen {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            padding: 8px 8px max(8px, env(safe-area-inset-bottom));
            overflow: hidden;
        }

        /* ── Top Bar ── */
        .top-bar {
            display: flex; gap: 5px;
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(20px);
            padding: 5px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0; margin-bottom: 6px;
        }
        .nav-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; height: 36px;
            padding: 0 4px; font-size: 9px; font-weight: 700;
            color: #94a3b8; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            touch-action: manipulation; transition: all 0.25s; white-space: nowrap;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: white; transform: translateY(-1px); }
        .nav-btn .material-symbols-rounded { font-size: 16px; }
        .auto-tr-btn.active {
            background: linear-gradient(135deg, #fb7185, #f43f5e);
            color: white; border-color: rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(251,113,133,0.4);
        }

        /* ── App Box ── */
        .app-box {
            background: linear-gradient(145deg, rgba(30,41,59,0.75), rgba(15,23,42,0.85));
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 14px 14px 12px; border-radius: 26px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 24px 48px -12px rgba(0,0,0,0.6), var(--shadow-glow);
            text-align: center; position: relative; overflow: hidden;
            display: flex; flex-direction: column; flex: 1; min-height: 0;
        }
        .app-box::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .header-center {
            display: flex; flex-direction: column;
            align-items: center; flex-shrink: 0; margin-bottom: 8px;
        }
        .app-logo {
            width: 42px; margin-bottom: 3px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            animation: float3d 3s ease-in-out infinite;
        }
        .sub-title-white { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.75); letter-spacing: 0.5px; margin-bottom: 2px; }
        .lesson-title-grad {
            background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; font-size: clamp(18px,5vw,26px); font-family: 'Poppins'; margin-bottom: 3px; line-height: 1.2;
        }
        #lessonSubTitle { color: #94a3b8; font-size: clamp(10px,2.8vw,13px); font-weight: 500; line-height: 1.4; }

        /* ── Phrase Box — yazı büyütüldü ── */
        .phrase-container {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; margin: 8px 0 10px;
            background: rgba(15,23,42,0.55); border-radius: 20px;
            padding: 20px 18px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }
        .phrase-container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--secondary), transparent); opacity: 0.5;
        }


        #phrase-tr {
            font-size: clamp(22px,6.5vw,32px); font-weight: 800;
            color: var(--secondary); margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(45,212,191,0.2); line-height: 1.3;
        }
        #phrase-en {
            font-size: clamp(16px,4.5vw,22px); color: #94a3b8;
            font-style: italic; transition: opacity 0.3s ease; line-height: 1.4;
            font-weight: 600;
        }

        /* ── TAP TO SPEAK ── */
        .btn-speak {
            flex-shrink: 0;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9, #0284c7);
            color: white; width: 100%;
            height: clamp(50px,10vw,60px);
            border-radius: 18px; font-size: clamp(14px,4vw,17px);
            font-weight: 900; border: none; font-family: 'Poppins';
            cursor: pointer; position: relative; overflow: hidden;
            animation: pulse-glow 2s infinite;
            touch-action: manipulation; transition: transform 0.2s;
            margin-bottom: 8px;
            box-shadow: 0 8px 0 #0369a1, 0 12px 30px rgba(56,189,248,0.35);
            letter-spacing: 0.5px;
        }
        .btn-speak::before {
            content: '';
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-speak:hover::before { left: 100%; }
        .btn-speak:active { transform: translateY(4px); box-shadow: 0 4px 0 #0369a1, 0 4px 15px rgba(56,189,248,0.3); }
        @keyframes pulse-glow {
            0%   { box-shadow: 0 8px 0 #0369a1, 0 0 0 0 rgba(56,189,248,0.7), 0 12px 30px rgba(56,189,248,0.35); }
            70%  { box-shadow: 0 8px 0 #0369a1, 0 0 0 12px rgba(56,189,248,0), 0 16px 40px rgba(56,189,248,0.45); }
            100% { box-shadow: 0 8px 0 #0369a1, 0 0 0 0 rgba(56,189,248,0), 0 12px 30px rgba(56,189,248,0.35); }
        }
        .recording {
            background: linear-gradient(135deg, #fb7185, #f43f5e) !important;
            animation: recording-glow 1s infinite !important;
            box-shadow: 0 8px 0 #be123c, 0 12px 30px rgba(251,113,133,0.4) !important;
        }
        .recording:active { transform: translateY(4px); box-shadow: 0 4px 0 #be123c !important; }
        @keyframes recording-glow {
            0%,100% { box-shadow: 0 8px 0 #be123c, 0 0 12px rgba(251,113,133,0.5); }
            50%      { box-shadow: 0 8px 0 #be123c, 0 0 30px rgba(251,113,133,0.9), 0 0 50px rgba(251,113,133,0.4); }
        }

        /* ── 3-Button Row ── */
        .btn-row-3 { display: flex; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }

        .btn-show {
            flex: 1;
            background: rgba(56,189,248,0.08);
            border: 2px solid rgba(56,189,248,0.5);
            color: #38bdf8; border-radius: 16px;
            height: clamp(46px,9.5vw,56px); font-size: clamp(10px,2.8vw,12px);
            font-weight: 800; cursor: pointer; transition: all 0.25s;
            font-family: 'Poppins'; letter-spacing: 0.3px; line-height: 1.3;
            backdrop-filter: blur(10px);
        }
        .btn-show:hover { background: rgba(56,189,248,0.15); border-color: #38bdf8; transform: translateY(-2px); }
        .btn-show:active { transform: translateY(0); }

        .btn-pass {
            flex: 1;
            background: linear-gradient(135deg, #fb7185 0%, #f43f5e 100%);
            color: white; border: none; border-radius: 16px;
            height: clamp(46px,9.5vw,56px); font-size: clamp(10px,2.8vw,12px);
            font-weight: 900; cursor: pointer; transition: all 0.2s;
            font-family: 'Poppins'; letter-spacing: 0.5px;
            box-shadow: 0 6px 0 #be123c, 0 10px 25px rgba(251,113,133,0.35);
        }
        .btn-pass:active { transform: translateY(4px); box-shadow: 0 2px 0 #be123c; }
        .btn-pass:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #be123c, 0 14px 30px rgba(251,113,133,0.4); }

        .btn-listen {
            flex: 1;
            background: linear-gradient(135deg, #2dd4bf 0%, #0d9488 100%);
            color: white; border: none; border-radius: 16px;
            height: clamp(46px,9.5vw,56px); font-size: clamp(10px,2.8vw,12px);
            font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            transition: all 0.2s; font-family: 'Poppins'; letter-spacing: 0.5px;
            box-shadow: 0 6px 0 #0f766e, 0 10px 25px rgba(45,212,191,0.35);
        }
        .btn-listen:active { transform: translateY(4px); box-shadow: 0 2px 0 #0f766e; }
        .btn-listen:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #0f766e, 0 14px 30px rgba(45,212,191,0.4); }
        .btn-listen .material-symbols-rounded { font-size: clamp(15px,4vw,19px); }

        /* ── 2-Button Row (BACK / NEXT) ── */
        .btn-row-2 { display: flex; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }

        .btn-nav {
            flex: 1;
            background: rgba(51,65,85,0.7);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            border-radius: 16px; height: clamp(44px,9vw,54px);
            font-size: clamp(12px,3.2vw,14px); font-weight: 800;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Poppins'; letter-spacing: 0.5px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            backdrop-filter: blur(10px);
        }
        .btn-nav:hover { background: rgba(71,85,105,0.85); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
        .btn-nav:active { transform: translateY(0); }
        .btn-nav .material-symbols-rounded { font-size: 18px; }

        /* ── Result ── */
        #result {
            flex-shrink: 0; height: 22px;
            font-weight: 700; font-size: clamp(11px,3vw,14px);
            display: flex; align-items: center; justify-content: center;
            margin: 0 0 6px; overflow: hidden;
        }

        /* ── Stats ── */
        .stats {
            flex-shrink: 0;
            background: rgba(15,23,42,0.55); padding: 10px 4px;
            border-radius: 16px; display: flex; justify-content: space-between;
            gap: 2px; border: 1px solid rgba(255,255,255,0.07);
        }
        .stat-item {
            display: flex; flex-direction: column;
            align-items: center; flex: 1; position: relative;
        }
        .stat-item:not(:last-child)::after {
            content: ''; position: absolute; right: 0; top: 20%; height: 60%; width: 1px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        .stat-label { font-size: 7px; font-weight: 800; letter-spacing: 0.5px; color: #64748b; margin-bottom: 3px; display: flex; align-items: center; gap: 3px; }
        .stat-icon { font-size: 8px; font-weight: 900; font-family: 'Poppins'; width: 13px; height: 13px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .stat-icon-sym { font-size: 11px !important; font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 20; line-height: 1; }
        .stat-val { font-size: clamp(14px,4vw,17px); font-weight: 900; font-variant-numeric: tabular-nums; }
        .stat-val.blue  { color: #38bdf8; }
        .stat-val.green { color: #2dd4bf; }
        .stat-val.red   { color: #fb7185; }
        .stat-val.orange{ color: #f97316; }

        /* ── Restart Overlay ── */
        #restartOverlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.98); border-radius: 26px;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; backdrop-filter: blur(15px);
        }
        #restartOverlay h2 {
            font-family: 'Poppins'; font-size: clamp(20px,6vw,28px); margin-bottom: 20px;
            background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @media (max-height: 650px) {
            .app-logo { width: 28px; }
            .sub-title-white { display: none; }
            .header-center { margin-bottom: 4px; }
            .phrase-container { margin: 4px 0 6px; }
            .btn-speak { height: 44px !important; margin-bottom: 5px; }
            .btn-row-3, .btn-row-2 { margin-bottom: 5px; gap: 6px; }
            .btn-show, .btn-pass, .btn-listen, .btn-nav { height: 38px !important; }
            #result { height: 18px; margin-bottom: 4px; }
        }
    </style>
</head>
<body>

<div class="v-tag">V.4.4</div>

<!-- ENTRY PAGE -->
<div id="entry-page">
    <img src="logo.png" style="width:70px;margin-bottom:10px;filter:drop-shadow(0 10px 20px rgba(0,0,0,0.3));animation:float3d 3s ease-in-out infinite;" onerror="this.style.display='none'">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div class="select-lesson-title">Module #1</div>
    <div id="lesson-list-container"></div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
    <div class="top-bar">
        <button class="nav-btn" onclick="goHome()">
            <span class="material-symbols-rounded">home</span> HOME
        </button>
        <button id="autoTRToggle" class="nav-btn auto-tr-btn" onclick="toggleAutoTR()">
            <span class="material-symbols-rounded">volume_up</span> AUTO TR
        </button>
        <button class="nav-btn" onclick="resetToStart()">
            <span class="material-symbols-rounded">refresh</span> RESTART
        </button>
    </div>

    <div class="app-box">
        <div id="restartOverlay">
            <h2>Completed! 🏆</h2>
            <button class="btn-speak" onclick="resetToStart()" style="width:80%;animation:none;box-shadow:none;">RESTART</button>
        </div>

        <div class="header-center">
            <img src="logo.png" class="app-logo" onerror="this.style.display='none'">
            <div class="sub-title-white">5 Dakikada İngilizce</div>
            <div id="lessonTitle" class="lesson-title-grad">#Lesson 1</div>
            <div id="lessonSubTitle">Yükleniyor...</div>
        </div>

        <div class="phrase-container">
            <div id="phrase-tr">...</div>
            <div id="phrase-en" style="opacity:0;">...</div>
        </div>

        <button class="btn-speak" id="startBtn">
            <span class="material-symbols-rounded" style="font-size:20px;vertical-align:middle;margin-right:6px;">mic</span>TAP TO SPEAK
        </button>

        <div class="btn-row-3">
            <button class="btn-show" id="toggleBtn">SHOW<br>ENGLISH</button>
            <button class="btn-pass" id="passBtn">PASS</button>
            <button class="btn-listen" id="listenBtn">
                <span class="material-symbols-rounded">record_voice_over</span> LISTEN
            </button>
        </div>

        <div class="btn-row-2">
            <button class="btn-nav" id="backBtn">
                <span class="material-symbols-rounded">arrow_back_ios_new</span> BACK
            </button>
            <button class="btn-nav" id="nextBtn">
                NEXT <span class="material-symbols-rounded">arrow_forward_ios</span>
            </button>
        </div>

        <div id="result"></div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">ORDER <span class="stat-icon" style="background:#38bdf8;color:#0f172a;">A</span></div>
                <span id="current" class="stat-val blue">1</span>
            </div>
            <div class="stat-item">
                <div class="stat-label">CORRECT <span class="material-symbols-rounded stat-icon-sym" style="color:#2dd4bf;">task_alt</span></div>
                <span id="correct" class="stat-val green">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label">PASS <span class="material-symbols-rounded stat-icon-sym" style="color:#fb7185;">fast_forward</span></div>
                <span id="passedCount" class="stat-val red">0</span>
            </div>
            <div class="stat-item">
                <div class="stat-label">REMAIN <span class="material-symbols-rounded stat-icon-sym" style="color:#f97316;">hourglass_bottom</span></div>
                <span id="remaining" class="stat-val orange">0</span>
            </div>
        </div>
    </div>
</div>

<script>
/* ────────────────────────────────────────
   SPEECH RECOGNITION — orijinal mantık korundu
──────────────────────────────────────── */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SR();
rec.lang = 'en-US';
rec.continuous = true;
rec.interimResults = false;
rec.maxAlternatives = 3;

/* ── State ── */
let allLessonsData = [], currentList = [];
let index = 0, correctCount = 0, passedCount = 0;
let isListening = false, showEn = false, autoMode = false;
let activeLessonId = null;
let isAutoTR = localStorage.getItem('auto_tr_voice') === 'true';
if (isAutoTR) document.getElementById('autoTRToggle').classList.add('active');

/* ── Rainbow colours for nodes ── */
const rainbowColors = [
    {bg:'#38bdf8',shadow:'#0284c7'},
    {bg:'#2dd4bf',shadow:'#0f766e'},
    {bg:'#a855f7',shadow:'#7e22ce'},
    {bg:'#fb7185',shadow:'#e11d48'},
    {bg:'#4ade80',shadow:'#16a34a'},
    {bg:'#60a5fa',shadow:'#2563eb'},
    {bg:'#f97316',shadow:'#c2410c'},
    {bg:'#e879f9',shadow:'#a21caf'},
];

/* ── Stars helper ── */
function getStarCount(lessonId) {
    return Math.min(parseInt(localStorage.getItem('speaking_stars_' + lessonId) || '0'), 3);
}
function renderStarsHTML(count) {
    let h = ''; for (let i = 0; i < 3; i++) h += i < count ? '⭐' : '☆'; return h;
}

/* ── Data ── */
fetch('data.json').then(r => r.json()).then(data => { allLessonsData = data; renderLessonMenu(); });

/* ── Menu — Duolingo S-shape ── */
function renderLessonMenu() {
    const c = document.getElementById('lesson-list-container');
    c.innerHTML = '';
    allLessonsData.forEach((lesson, i) => {
        const ok = !!lesson.file;
        const colorSet = rainbowColors[i % rainbowColors.length];
        const logoFile = lesson.logo ? `logos/${lesson.logo}` : `logos/lessonlogo${lesson.id}.svg`;
        const starCount = getStarCount(lesson.id);

        const nodeLogo = `<div class="node-logo" style="background-image:url('${logoFile}');"></div>`;

        const card = document.createElement('div');
        card.className = 'lesson-card' + (!ok ? ' disabled' : '');
        if (ok) card.onclick = () => startLesson(lesson);

        card.innerHTML = `
            <div class="node-btn" style="background:${colorSet.bg};box-shadow:0 8px 0 ${colorSet.shadow},0 12px 24px rgba(0,0,0,0.3);">
                ${nodeLogo}
            </div>
            <h3>${lesson.title}</h3>
            <div class="lesson-sub">${ok ? (lesson.subTitle || '') : 'Coming Soon'}</div>
            <div class="lesson-stars">${renderStarsHTML(starCount)}</div>
        `;
        c.appendChild(card);
    });

    /* active / completed badge */
    const allCards = c.querySelectorAll('.lesson-card');
    let activeFound = false;
    allLessonsData.forEach((lesson, i) => {
        if (!lesson.file) return;
        const starCount = getStarCount(lesson.id);
        const card = allCards[i];
        if (starCount > 0) {
            card.classList.add('completed');
        } else if (!activeFound) {
            card.classList.add('active');
            activeFound = true;
            const badge = document.createElement('div');
            badge.className = 'start-badge';
            badge.innerText = 'HADİ!';
            card.appendChild(badge);
        }
    });
}

/* ── Start Lesson ── */
function startLesson(lesson) {
    fetch(lesson.file).then(r => r.json()).then(data => {
        activeLessonId = lesson.id;
        currentList = [...data];
        const saved = localStorage.getItem('lesson_progress_' + activeLessonId);
        if (saved) {
            const p = JSON.parse(saved);
            index = p.index; correctCount = p.correctCount; passedCount = p.passedCount;
        } else {
            index = 0; correctCount = 0; passedCount = 0;
        }
        document.getElementById('lessonTitle').innerText = lesson.title;
        document.getElementById('lessonSubTitle').innerText = lesson.subTitle;
        document.getElementById('entry-page').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        render(true);
    });
}

/* ── Render ── */
function render(speakTR = false) {
    if (index >= currentList.length) { document.getElementById('restartOverlay').style.display = 'flex'; return; }
    document.getElementById('phrase-tr').textContent = currentList[index].tr;
    document.getElementById('phrase-en').textContent = currentList[index].en;
    document.getElementById('phrase-en').style.opacity = showEn ? '1' : '0';
    document.getElementById('toggleBtn').innerHTML = showEn ? 'HIDE<br>ENGLISH' : 'SHOW<br>ENGLISH';
    document.getElementById('current').textContent = index + 1;
    document.getElementById('correct').textContent = correctCount;
    document.getElementById('passedCount').textContent = passedCount;
    document.getElementById('remaining').textContent = currentList.length - (index + 1);
    saveProgress();
    if (isAutoTR && speakTR) setTimeout(doSpeakTR, 400);
}
function saveProgress() {
    if (activeLessonId) localStorage.setItem('lesson_progress_' + activeLessonId, JSON.stringify({ index, correctCount, passedCount }));
}

/* ── TTS ── */
function doSpeakTR() {
    if (!currentList.length || !isAutoTR) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(currentList[index].tr);
    u.lang = 'tr-TR'; u.rate = 1.0; window.speechSynthesis.speak(u);
}
function speakEN() {
    if (!currentList.length) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(currentList[index].en);
    u.lang = 'en-US'; u.rate = 0.8; window.speechSynthesis.speak(u);
}

/* ── Audio Context — global, kullanıcı dokunuşuyla başlatılır ── */
let audioCtx = null;

function initAudioCtx() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// İlk dokunuşta AudioContext'i aç (mobil için zorunlu)
document.addEventListener('touchstart', initAudioCtx, { once: false, passive: true });
document.addEventListener('mousedown', initAudioCtx, { once: false });

/* ── Beep ── */
function playBeep(ok) {
    try {
        initAudioCtx();
        if (!audioCtx) return;

        audioCtx.resume().then(() => {
            const t = audioCtx.currentTime;

            if (ok) {
                // Doğru: iki tonlu yükselen ding ding sesi
                [0, 0.15].forEach((delay, i) => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.connect(g); g.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = i === 0 ? 880 : 1100;
                    g.gain.setValueAtTime(0, t + delay);
                    g.gain.linearRampToValueAtTime(0.35, t + delay + 0.03);
                    g.gain.exponentialRampToValueAtTime(0.01, t + delay + 0.25);
                    osc.start(t + delay);
                    osc.stop(t + delay + 0.25);
                });
            } else {
                // Yanlış: alçalan tok boing sesi
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.connect(g); g.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(80, t + 0.35);
                g.gain.setValueAtTime(0.3, t);
                g.gain.exponentialRampToValueAtTime(0.01, t + 0.35);
                osc.start(t);
                osc.stop(t + 0.35);
            }
        });
    } catch(e) { console.warn('Beep error:', e); }
}

/* ── Normalize ── */
function normalizeForComparison(text) {
    const numMap = { '0':'zero','1':'one','2':'two','3':'three','4':'four','5':'five','6':'six','7':'seven','8':'eight','9':'nine','10':'ten' };
    let t = text.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,'');
    Object.keys(numMap).forEach(n => { t = t.replace(new RegExp(`\\b${n}\\b`,'g'), numMap[n]); });
    return t.replace(/\boff\b/g,'of');
}

/* ── SR Events — orijinal mantık korundu ── */
rec.onstart = () => {
    isListening = true;
    document.getElementById('startBtn').innerHTML = '<span class="material-symbols-rounded" style="font-size:20px;vertical-align:middle;margin-right:6px;">hearing</span>LISTENING...';
    document.getElementById('startBtn').classList.add('recording');
};

rec.onresult = (e) => {
    let spoken = e.results[e.results.length - 1][0].transcript;
    const target = currentList[index].en;
    const ps = normalizeForComparison(spoken);
    const pt = normalizeForComparison(target);

    if (ps === pt || ps.includes(pt)) {
        correctCount++;
        playBeep(true);
        document.getElementById('result').innerHTML = "<span style='color:var(--secondary)'>EXCELLENT! ✅</span>";
        setTimeout(() => { nextWord(); if (!autoMode) rec.stop(); }, 800);
    } else {
        playBeep(false);
        document.getElementById('result').innerHTML = `<span style='color:var(--accent)'>HEARD: "${spoken}" ❌</span>`;
    }
};

rec.onend = () => {
    if (autoMode) {
        rec.start();
    } else {
        isListening = false;
        document.getElementById('startBtn').innerHTML = '<span class="material-symbols-rounded" style="font-size:20px;vertical-align:middle;margin-right:6px;">mic</span>TAP TO SPEAK';
        document.getElementById('startBtn').classList.remove('recording');
    }
};

/* ── Buttons ── */
document.getElementById('startBtn').onclick = () => {
    initAudioCtx();
    if (!isListening) { autoMode = true; rec.start(); }
    else { autoMode = false; rec.stop(); }
};
document.getElementById('listenBtn').onclick = speakEN;
document.getElementById('toggleBtn').onclick = () => { showEn = !showEn; render(false); };
document.getElementById('nextBtn').onclick = nextWord;
document.getElementById('backBtn').onclick = () => { if (index > 0) { index--; render(true); } };
document.getElementById('passBtn').onclick = () => { passedCount++; currentList.push(currentList[index]); nextWord(); };

function nextWord() {
    if (index < currentList.length - 1) { index++; showEn = false; render(true); document.getElementById('result').innerHTML = ''; }
    else { document.getElementById('restartOverlay').style.display = 'flex'; }
}
function toggleAutoTR() {
    isAutoTR = !isAutoTR;
    localStorage.setItem('auto_tr_voice', isAutoTR);
    document.getElementById('autoTRToggle').classList.toggle('active');
}
function goHome() {
    autoMode = false; try { rec.stop(); } catch(e) {}
    isListening = false;
    document.getElementById('startBtn').innerHTML = '<span class="material-symbols-rounded" style="font-size:20px;vertical-align:middle;margin-right:6px;">mic</span>TAP TO SPEAK';
    document.getElementById('startBtn').classList.remove('recording');
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('entry-page').style.display = 'flex';
}
function resetToStart() {
    if (confirm('Sıfırlansın mı?')) {
        index = 0; correctCount = 0; passedCount = 0;
        localStorage.removeItem('lesson_progress_' + activeLessonId);
        document.getElementById('restartOverlay').style.display = 'none';
        render(true); document.getElementById('result').innerHTML = '';
    }
}
</script>
</body>
</html>
